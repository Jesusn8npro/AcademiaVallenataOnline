[variables]
    NODE_ENV = "production"
    NODE_OPTIONS = "--max-old-space-size=4096"

[phases.setup]
    # El nixpkgs por defecto de Nixpacks/Easypanel es viejo: no tiene
    # `nodejs_22` y su `nodejs_20` es 20.6.1 (Next 16 exige >=20.9).
    # Fijamos un snapshot de nixpkgs que SÍ trae Node 22.13.1.
    # (commit verificado, ver echobind.com/post/solving-nixpacks-node-version-issues)
    nixpkgsArchive = "51ad838b03a05b1de6f9f2a0fffecee64a9788ee"
    # Declarar nodejs_22 explícito mantiene el proveedor Node (evita que
    # Nixpacks detecte Deno por la carpeta supabase/functions).
    nixPkgs = ["nodejs_22", "python3", "pkg-config", "vips"]

[phases.build]
    cmds = ["npm run build"]

[start]
    cmd = "npm run start"
