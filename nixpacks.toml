[variables]
    NODE_ENV = "production"
    NIXPACKS_METRI_MODE = "true"
    NODE_OPTIONS = "--max-old-space-size=4096"

[phases.setup]
    nixPkgs = ["nodejs", "python3", "pkg-config"]

[phases.install]
    cmds = ["npm install --include=dev --legacy-peer-deps"]

[phases.build]
    cmds = ["npm run build"]

[start]
    cmd = "npm run preview"
